name: Release Docs and NuGet

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

jobs:
  build-docs:
    name: Build DocFX Site
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Install DocFX
        run: dotnet tool install --global docfx --version 2.78.3

      - name: Add .NET tools to PATH
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Generate API metadata
        run: docfx metadata docs/docfx.json

      - name: Build DocFX site
        run: docfx build docs/docfx.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy-docs:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build-docs
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-nuget:
    name: Publish NuGet Packages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore testprog.sln

      - name: Extract package version from tag
        id: version
        run: |
          RAW_TAG="${GITHUB_REF_NAME}"
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack messenger
        run: |
          dotnet pack messenger/messenger.csproj \
            --configuration Release \
            --output artifacts/nuget \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            --include-symbols \
            --include-source

      - name: Pack client
        run: |
          dotnet pack client/client.csproj \
            --configuration Release \
            --output artifacts/nuget \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            --include-symbols \
            --include-source

      - name: Pack server
        run: |
          dotnet pack server/server.csproj \
            --configuration Release \
            --output artifacts/nuget \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true \
            --include-symbols \
            --include-source

      - name: Pack meta package
        run: |
          dotnet pack testprog-meta/testprog-meta.csproj \
            --configuration Release \
            --output artifacts/nuget \
            -p:PackageVersion=${{ steps.version.outputs.version }} \
            -p:Version=${{ steps.version.outputs.version }} \
            -p:ContinuousIntegrationBuild=true

      - name: Push NuGet packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/nuget/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Push symbol packages
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          dotnet nuget push "artifacts/nuget/*.snupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate
